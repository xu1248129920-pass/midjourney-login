<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDJOURNEY - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050a14;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none; /* 禁止手机端默认触摸行为 */
        }
        #matrix-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6;
        }
        .logo-container {
            position: relative; z-index: 10; text-align: center; margin-bottom: 60px; padding: 0 20px;
        }
        .pixel-logo {
            font-size: 4rem; font-weight: bold; letter-spacing: 10px; color: transparent;
            -webkit-text-stroke: 2px #3b82f6; 
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0% { transform: skew(0deg); opacity: 1; }
            5% { transform: skew(2deg); opacity: 0.8; }
            10% { transform: skew(-2deg); opacity: 1; }
            15% { transform: skew(0deg); opacity: 1; }
            95% { transform: skew(0deg); opacity: 1; }
            98% { transform: skew(5deg); opacity: 0.5; }
            100% { transform: skew(0deg); opacity: 1; }
        }
        .action-bar {
            position: fixed; bottom: 50px; left: 0; right: 0;
            z-index: 20; display: flex; justify-content: center; align-items: center;
        }
        .btn-single {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #60a5fa;
            padding: 14px 40px;
            font-size: 18px; font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; /* 防止作为链接时出现下划线 */
        }
        .btn-single:active { transform: scale(0.95); }
        
        /* 手机端特别优化 */
        @media (max-width: 768px) {
            .pixel-logo { font-size: 2.5rem; letter-spacing: 5px; }
            .btn-single { padding: 12px 30px; font-size: 16px; width: 80%; max-width: 300px; justify-content: center;}
        }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div class="logo-container">
        <h1 class="pixel-logo">MIDJOURNEY</h1>
    </div>
    <div class="action-bar">
        <!-- 这里可以换成真实的登录链接，比如 href="https://midjourney.com/login" -->
        <a href="#" class="btn-single" onclick="alert('正在跳转登录...'); return false;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
            登 录
        </a>
    </div>
    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        let w, h, columns, drops;
        const chars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        
        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            columns = Math.floor(w / 14);
            drops = Array(columns).fill(0);
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(5, 10, 20, 0.05)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#3b82f6';
            ctx.font = '14px monospace';
            for(let i = 0; i < drops.length; i++) {
                ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, drops[i] * 14);
                if(drops[i] * 14 > h && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        
        window.addEventListener('resize', init);
        init();
        setInterval(draw, 33);
    </script>
</body>
</html>
