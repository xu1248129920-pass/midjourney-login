<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAUNCH SEQUENCE V2 (30 MIN)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050508;
            color: #e8e8e8;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        .pixel-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 10px 10px;
            z-index: 0;
        }

        .bg-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 50% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 60%);
            z-index: 1;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 80% 50%, rgba(255,255,255,0.5), transparent);
            background-size: 300px 300px;
            animation: starMove 100s linear infinite;
            z-index: 2;
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(99, 102, 241, 0.3);
            padding: 40px 30px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(99, 102, 241, 0.4);
            transition: border-color 0.3s ease;
            pointer-events: none;
        }
        .card::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .card::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .card.alert-mode { border-color: rgba(239, 68, 68, 0.6); }
        .card.alert-mode::before, .card.alert-mode::after { border-color: rgba(239, 68, 68, 0.6); }

        .title {
            font-size: 0.6rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .card.alert-mode .title { color: rgba(239, 68, 68, 0.8); }
        .card.alert-mode .subtitle { color: rgba(239, 68, 68, 0.95); }

        .timer-box {
            position: relative;
            width: 160px; /* 稍微加宽以容纳 MM:SS */
            height: 140px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(99, 102, 241, 0.3);
            transition: border-color 0.3s ease;
        }

        .card.alert-mode .timer-box { border-color: rgba(239, 68, 68, 0.6); }

        .timer-number {
            font-size: 3.5rem; /* 稍微调小字体以适应两位数 */
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #fff;
            letter-spacing: -1px;
            transition: color 0.3s ease;
        }

        .card.alert-mode .timer-number {
            color: rgba(239, 68, 68, 0.95);
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .btn {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #4f46e5, 0 8px 25px -8px rgba(99, 102, 241, 0.4);
            font-family: 'Courier New', monospace;
            margin: 0 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #4f46e5, 0 12px 35px -8px rgba(99, 102, 241, 0.6);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #4f46e5, 0 4px 25px -8px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-cancel {
            background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
            box-shadow: 0 4px 0 #1f2937, 0 8px 25px -8px rgba(0, 0, 0, 0.4);
        }
        .btn-cancel:hover {
            box-shadow: 0 6px 0 #1f2937, 0 12px 35px -8px rgba(0, 0, 0, 0.6);
        }

        .card.alert-mode .btn-launch {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 0 #b91c1c, 0 8px 25px -8px rgba(239, 68, 68, 0.4);
        }

        .status { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }

        .status-dot {
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.4s ease;
        }

        .status-dot.active { background: #6366f1; box-shadow: 0 0 4px #6366f1; }

        .card.alert-mode .status-dot.active {
            background: rgba(239, 68, 68, 0.9);
            box-shadow: 0 0 4px rgba(239, 68, 68, 0.6);
        }

        .success-content { display: none; }

        .success-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #10b981, #34d399);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .success-icon svg { width: 25px; height: 25px; color: #fff; }

        .doll-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: none;
            background: rgba(0,0,0,0.8);
        }

        .doll-head {
            width: 160px;
            height: 160px;
            opacity: 0;
            transform: scale(0.5);
        }

        .doll-head svg { width: 100%; height: 100%; }

        .doll-text {
            position: absolute;
            top: 58%;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            color: #ef4444;
            text-shadow: 2px 2px 0 #000;
            opacity: 0;
            letter-spacing: 2px;
            font-weight: bold;
        }

        @keyframes starMove { 0% { transform: translateY(0); } 100% { transform: translateY(-300px); } }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 35px rgba(239, 68, 68, 0.12), inset 0 0 15px rgba(239, 68, 68, 0.04); }
            50% { box-shadow: 0 0 55px rgba(239, 68, 68, 0.2), inset 0 0 30px rgba(239, 68, 68, 0.1); }
        }
        @keyframes numberFlash { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes subtleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(60); opacity: 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes dollAppear {
            0% { opacity: 0; transform: scale(0.5); }
            60% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes dollTextAppear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card.pulsing { animation: pulseGlow 2s ease-in-out infinite; }
        .card.pulsing .timer-number { animation: numberFlash 2s ease-in-out infinite; }
        .shaking { animation: subtleShake 0.4s ease-in-out infinite; }
        .exploded { animation: explode 0.8s forwards; }
        .hidden { display: none !important; }

        .sound-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            transition: all 0.3s;
            z-index: 100;
        }
        .sound-toggle:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .sound-toggle.muted { opacity: 0.4; }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="pixel-grid"></div>
    <div class="bg-gradient"></div>
    <div class="stars"></div>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <div class="card" id="mainCard">
        <div id="launchContent">
            <div class="title" id="statusTitle">SYSTEM READY</div>
            <div class="subtitle" id="statusText">30 MINUTE SEQUENCE</div>
            <div class="timer-box" id="timerBox">
                <div class="timer-number" id="timerDisplay">30:00</div>
            </div>
            <div class="button-group">
                <button class="btn btn-launch" id="launchBtn" onclick="startSequence()">INITIATE</button>
                <button class="btn btn-cancel" id="cancelBtn" onclick="cancelSequence()" style="display:none;">ABORT</button>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <div class="status-dot"></div>
                <div class="status-dot"></div>
            </div>
        </div>
        <div class="success-content" id="successContent">
            <div class="success-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <div class="title" style="color:#34d399">COMPLETE</div>
            <div class="subtitle">SYSTEM OPERATIONAL</div>
        </div>
    </div>

    <div class="doll-animation" id="dollAnimation">
        <div class="doll-head" id="dollHead">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="2" width="8" height="2" fill="#ff6b9d"/>
                <rect x="3" y="3" width="2" height="3" fill="#ff6b9d"/>
                <rect x="11" y="3" width="2" height="3" fill="#ff6b9d"/>
                <rect x="5" y="4" width="6" height="1" fill="#ffe0bd"/>
                <rect x="4" y="5" width="8" height="4" fill="#ffe0bd"/>
                <rect x="5" y="9" width="6" height="2" fill="#ffe0bd"/>
                <rect x="5" y="6" width="2" height="2" fill="#2d2d2d"/>
                <rect x="9" y="6" width="2" height="2" fill="#2d2d2d"/>
                <rect x="6" y="6" width="1" height="1" fill="#ffffff"/>
                <rect x="10" y="6" width="1" height="1" fill="#ffffff"/>
                <rect x="4" y="7" width="1" height="1" fill="#ffb6c1"/>
                <rect x="11" y="7" width="1" height="1" fill="#ffb6c1"/>
                <rect x="7" y="9" width="2" height="1" fill="#ff4757"/>
                <rect x="6" y="11" width="4" height="3" fill="#8b5cf6"/>
                <rect x="5" y="12" width="1" height="2" fill="#8b5cf6"/>
                <rect x="10" y="12" width="1" height="2" fill="#8b5cf6"/>
            </svg>
        </div>
        <div class="doll-text" id="dollText">MISSION FAILED</div>
    </div>

    <script>
        const timerDisplay = document.getElementById('timerDisplay');
        const launchBtn = document.getElementById('launchBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const mainCard = document.getElementById('mainCard');
        const launchContent = document.getElementById('launchContent');
        const successContent = document.getElementById('successContent');
        const statusTitle = document.getElementById('statusTitle');
        const statusText = document.getElementById('statusText');
        const dots = document.querySelectorAll('.status-dot');
        const soundToggle = document.getElementById('soundToggle');
        const dollAnimation = document.getElementById('dollAnimation');
        const dollHead = document.getElementById('dollHead');
        const dollText = document.getElementById('dollText');

        let dotIndex = 0;
        let dotInterval;
        let soundEnabled = true;
        let audioCtx = null;
        let alarmInterval = null;
        let timerInterval = null;
        let totalSeconds = 30 * 60; // 30 minutes
        let isRunning = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().catch(e => console.log("Audio resume failed:", e));
            }
        }

        function playAlarmTick() {
            if (!soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);
            osc1.type = 'square';
            osc2.type = 'square';
            osc1.frequency.setValueAtTime(800, now);
            osc2.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc1.start(now);
            osc1.stop(now + 0.1);
            osc2.start(now);
            osc2.stop(now + 0.1);
        }

        function playExplosion() {
            if (!soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.frequency.setValueAtTime(80, now);
            osc1.frequency.exponentialRampToValueAtTime(30, now + 1.0);
            osc1.type = 'sawtooth';
            gain1.gain.setValueAtTime(0.5, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
            osc1.start(now);
            osc1.stop(now + 1.0);
        }

        function playSuccess() {
            if (!soundEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, now + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                osc.start(now + i * 0.1);
                osc.stop(now + i * 0.1 + 0.4);
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
            soundToggle.classList.toggle('muted', !soundEnabled);
            initAudio();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function startSequence() {
            if (isRunning) return;
            try {
                initAudio();
                isRunning = true;
                
                mainCard.classList.add('alert-mode', 'pulsing');
                statusTitle.textContent = '⚠️ ARMED';
                statusText.textContent = 'COUNTDOWN INITIATED';
                
                launchBtn.style.display = 'none';
                cancelBtn.style.display = 'inline-block';
                
                let count = totalSeconds;
                timerDisplay.textContent = formatTime(count);

                dotInterval = setInterval(() => {
                    dots.forEach(d => d.classList.remove('active'));
                    dots[dotIndex].classList.add('active');
                    dotIndex = (dotIndex + 1) % 3;
                }, 300);

                timerInterval = setInterval(() => {
                    count--;
                    timerDisplay.textContent = formatTime(count);
                    
                    // 最后10秒开始警报
                    if (count === 10) {
                        playAlarmTick();
                        alarmInterval = setInterval(playAlarmTick, 1000);
                    }
                    if (count === 5) {
                        clearInterval(alarmInterval);
                        alarmInterval = setInterval(playAlarmTick, 500);
                    }
                    if (count === 3) {
                        clearInterval(alarmInterval);
                        alarmInterval = setInterval(playAlarmTick, 200);
                        mainCard.classList.add('shaking');
                        statusTitle.textContent = '⚠️ CRITICAL';
                        statusText.textContent = 'FINAL SEQUENCE';
                    }

                    if (count <= 0) {
                        clearInterval(timerInterval);
                        clearInterval(dotInterval);
                        if (alarmInterval) clearInterval(alarmInterval);
                        explode();
                    }
                }, 1000);
            } catch (e) {
                console.error("Sequence start error:", e);
                alert("启动失败，请刷新页面重试");
                resetUI();
            }
        }

        function cancelSequence() {
            if (!isRunning) return;
            
            clearInterval(timerInterval);
            clearInterval(dotInterval);
            if (alarmInterval) clearInterval(alarmInterval);
            
            resetUI();
        }

        function resetUI() {
            isRunning = false;
            mainCard.classList.remove('alert-mode', 'pulsing', 'shaking');
            statusTitle.textContent = 'SYSTEM READY';
            statusText.textContent = '30 MINUTE SEQUENCE';
            timerDisplay.textContent = formatTime(totalSeconds);
            launchBtn.style.display = 'inline-block';
            launchBtn.disabled = false;
            launchBtn.textContent = 'INITIATE';
            cancelBtn.style.display = 'none';
            dots.forEach(d => d.classList.remove('active'));
        }

        function explode() {
            timerDisplay.textContent = '00:00';
            playExplosion();
            isRunning = false;
            
            setTimeout(() => {
                mainCard.classList.remove('shaking', 'pulsing');
                mainCard.classList.add('exploded');
                
                setTimeout(() => {
                    dollAnimation.style.display = 'flex';
                    setTimeout(() => {
                        dollHead.style.animation = 'dollAppear 0.8s ease-out forwards';
                        dollText.style.animation = 'dollTextAppear 0.6s ease-out 0.2s forwards';
                    }, 50);
                    
                    setTimeout(() => {
                        dollAnimation.style.display = 'none';
                        launchContent.classList.add('hidden');
                        successContent.style.display = 'block';
                        successContent.style.animation = 'fadeIn 0.4s ease forwards';
                        mainCard.classList.remove('exploded', 'alert-mode');
                        playSuccess();
                    }, 3000);
                }, 800);
            }, 100);
        }
    </script>
</body>
</html>
